<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Kernel-centric concentric architecture</title>
<desc>A kernel sits at the center as the syscall bus and dispatcher (also holding the Buffer state). Contract wraps it as the shared vocabulary: ports (Symbols), model and errors. Four peer devices — Infrastructure, Compute, Circuit, Presentation — hang off the bus as sectors of one ring, each depending only on Kernel and Contract, with no edges between them. Driver is the outer gateway ring that binds every device. Dependencies point inward toward the kernel. Colors follow the Clean Architecture palette.</desc>
